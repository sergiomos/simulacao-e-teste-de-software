name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r ./ex11/requirements.txt

      - name: Lint (flake8)
        run: flake8 ./ex11/calculadora.py ./ex11/test_calculadora.py --max-line-length=100

      - name: Testes com cobertura
        run: cd ex11 && pytest --cov=calculadora --cov-report=term-missing --cov-report=xml --cov-fail-under=80

      - name: Publicar relatorio de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
